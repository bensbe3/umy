<!doctype html>
<html lang="fr" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary -->
    <title>United Moroccan Youth (UMY) | Engagement civique & leadership jeunesse au Maroc</title>
    <meta
      name="description"
      content="United Moroccan Youth (UMY) est une organisation marocaine dirigée par des jeunes : engagement civique, leadership, orientation académique, opportunités internationales, bourses et initiatives sociales."
    />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="googlebot" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="author" content="United Moroccan Youth" />
    <link rel="canonical" href="https://unitedmoroccanyouth.org" />

    <!-- Language / hreflang (single canonical language versions for now) -->
    <link rel="alternate" href="https://unitedmoroccanyouth.org" hreflang="fr" />
    <link rel="alternate" href="https://unitedmoroccanyouth.org" hreflang="en" />
    <link rel="alternate" href="https://unitedmoroccanyouth.org" hreflang="ar" />
    <link rel="alternate" href="https://unitedmoroccanyouth.org" hreflang="x-default" />

    <!-- Favicons -->
    <link rel="icon" type="image/png" href="/images/logoUmy.png" />
    <link rel="apple-touch-icon" href="/images/logoUmy.png" />
    <meta name="theme-color" content="#022c22" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://unitedmoroccanyouth.org" />
    <meta property="og:title" content="United Moroccan Youth (UMY)" />
    <meta
      property="og:description"
      content="Engagement civique, leadership, orientation académique et opportunités pour la jeunesse marocaine."
    />
    <meta property="og:image" content="https://unitedmoroccanyouth.org/images/logoUmy.png" />
    <meta property="og:image:alt" content="United Moroccan Youth (UMY) — logo" />
    <meta property="og:site_name" content="United Moroccan Youth" />
    <meta property="og:locale" content="fr_MA" />
    <meta property="og:locale:alternate" content="en_US" />
    <meta property="og:locale:alternate" content="ar_MA" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="United Moroccan Youth (UMY)" />
    <meta
      name="twitter:description"
      content="Engagement civique, leadership et opportunités pour la jeunesse marocaine."
    />
    <meta name="twitter:image" content="https://unitedmoroccanyouth.org/images/logoUmy.png" />
    <meta name="twitter:image:alt" content="United Moroccan Youth (UMY) — logo" />

    <!-- Optional (kept short; avoid keyword stuffing) -->
    <meta
      name="keywords"
      content="United Moroccan Youth, UMY, jeunesse marocaine, engagement civique, leadership, orientation académique, bourses, opportunités internationales"
    />

    <!-- Structured data: Organization + WebSite (page-level JSON-LD is injected by React per route) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": ["Organization", "NGO"],
        "name": "United Moroccan Youth",
        "alternateName": "UMY",
        "url": "https://unitedmoroccanyouth.org",
        "description": "Organisation marocaine dirigée par des jeunes : engagement civique, leadership, orientation académique, opportunités internationales et initiatives sociales.",
        "logo": {
          "@type": "ImageObject",
          "url": "https://unitedmoroccanyouth.org/images/logoUmy.png"
        },
        "image": "https://unitedmoroccanyouth.org/images/logoUmy.png",
        "foundingDate": "2024-01-01",
        "areaServed": { "@type": "Country", "name": "Morocco" },
        "contactPoint": [
          {
            "@type": "ContactPoint",
            "email": "contact@unitedmoroccanyouth.org",
            "contactType": "General inquiries",
            "availableLanguage": ["fr", "en", "ar"]
          }
        ]
      }
    </script>

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "United Moroccan Youth",
        "alternateName": "UMY",
        "url": "https://unitedmoroccanyouth.org"
      }
    </script>

    <!-- Performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
