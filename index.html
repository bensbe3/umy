<!doctype html>
<html lang="fr" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary -->
    <title>United Moroccan Youth | Engagement civique & leadership jeunesse au Maroc</title>
    <meta
      name="description"
      content="United Moroccan Youth (UMY) est une organisation marocaine dirigée par des jeunes : engagement civique, leadership, orientation académique, opportunités internationales, bourses et initiatives sociales."
    />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="googlebot" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="author" content="Mohamed Bensbaa" />
    <link rel="canonical" href="https://unitedmoroccanyouth.org" />

    <!--
      ✅ Google Search Console verification
      Replace REPLACE_WITH_YOUR_CODE with the meta tag value from:
      Search Console → Add Property → HTML tag method
    -->
    <!-- <meta name="google-site-verification" content="QC9yMb6Md7mEer_iU_TXfHDtPH0ZA2uxm4ee_OKCaWM" /> -->

    <!-- Language / hreflang -->
    <link rel="alternate" href="https://unitedmoroccanyouth.org" hreflang="fr" />
    <link rel="alternate" href="https://unitedmoroccanyouth.org" hreflang="en" />
    <link rel="alternate" href="https://unitedmoroccanyouth.org" hreflang="ar" />
    <link rel="alternate" href="https://unitedmoroccanyouth.org" hreflang="x-default" />

    <!-- Favicons -->
    <link rel="icon" type="image/png" href="/images/logoUmy.png" />
    <link rel="apple-touch-icon" href="/images/logoUmy.png" />
    <meta name="theme-color" content="#022c22" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://unitedmoroccanyouth.org" />
    <meta property="og:title" content="United Moroccan Youth (UMY)" />
    <meta
      property="og:description"
      content="Engagement civique, leadership, orientation académique et opportunités pour la jeunesse marocaine."
    />
    <meta property="og:image" content="https://unitedmoroccanyouth.org/images/logoUmy.png" />
    <meta property="og:image:alt" content="United Moroccan Youth (UMY) — logo" />
    <meta property="og:site_name" content="United Moroccan Youth" />
    <meta property="og:locale" content="fr_MA" />
    <meta property="og:locale:alternate" content="en_US" />
    <meta property="og:locale:alternate" content="ar_MA" />

   
    <!-- Keywords -->
    <meta
      name="keywords"
      content="United Moroccan Youth, UMY, jeunesse marocaine, engagement civique, leadership, orientation académique, bourses, opportunités internationales, DécryptMundi, parlement jeunesse Maroc, analyse geopolique, Decryptage marocain, Decryptage geopolique, moroccan youth, jeunesse marocaine, jeunesse maroc, jeunes du maroc, chabab, parti politique"
    />

    <!-- ✅ Organization JSON-LD — with sameAs social profiles -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": ["Organization", "NGO"],
        "name": "United Moroccan Youth",
        "alternateName": "UMY",
        "url": "https://unitedmoroccanyouth.org",
        "description": "Organisation marocaine dirigée par des jeunes : engagement civique, leadership, orientation académique, opportunités internationales et initiatives sociales.",
        "logo": {
          "@type": "ImageObject",
          "url": "https://unitedmoroccanyouth.org/images/logoUmy.png"
        },
        "image": "https://unitedmoroccanyouth.org/images/logoUmy.png",
        "foundingDate": "2024-01-01",
        "areaServed": { "@type": "Country", "name": "Morocco" },
        "contactPoint": [
          {
            "@type": "ContactPoint",
            "email": "contact@unitedmoroccanyouth.org",
            "contactType": "General inquiries",
            "availableLanguage": ["fr", "en", "ar"]
          }
        ],
        "sameAs": [
          "https://www.instagram.com/unitedmoroccanyouth"
        ]
      }
    </script>

    <!-- ✅ WebSite JSON-LD with SearchAction (enables Google sitelinks search) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "United Moroccan Youth",
        "alternateName": "UMY",
        "url": "https://unitedmoroccanyouth.org",
        "potentialAction": {
          "@type": "SearchAction",
          "target": {
            "@type": "EntryPoint",
            "urlTemplate": "https://unitedmoroccanyouth.org/decryptmundi?q={search_term_string}"
          },
          "query-input": "required name=search_term_string"
        }
      }
    </script>

    <!-- Performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
