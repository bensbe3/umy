    {

      "foundingDate": "2024-01-01",
      "founder": {

        "contactType": "General Inquiries"
      },
      "areaServed": "MA",
      "knowsAbout": [
        "Engagement Civique",
        "Développement Social",
        "Relations Internationales",

        "Politique Marocaine",
        "Simulations Politiques",
        "Gouvernance Locale",

      ],
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Programmes UMY",
        "itemListElement": [
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "EducationalOccupationalProgram",
              "name": "Inside Moroccan Politics",
              "description": "Programme éducatif introduisant les jeunes au système politique marocain à travers des dialogues avec les partis politiques, des visites institutionnelles et des rencontres ministérielles. Comprend des sessions de formation, des visites dans les sièges des partis et les institutions gouvernementales pour comprendre la prise de décision politique et la gouvernance."
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "EducationalOccupationalProgram",
              "name": "Civic & Political Education Program",
              "description": "Programme de formation complet visant à renforcer la sensibilisation politique, l'engagement civique et les capacités de leadership des jeunes. Structure multi-modules couvrant le système politique marocain, les institutions constitutionnelles, la citoyenneté, la démocratie participative, la société civile, la gouvernance numérique et l'intelligence émotionnelle."
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "EducationalOccupationalProgram",
              "name": "Politicon - Hackathon Politique",
              "description": "Hackathon politique éducatif engageant les jeunes dans la réflexion politique pratique à travers la créativité et le travail d'équipe. Les participants créent des partis politiques fictifs, développent des visions politiques, conçoivent des propositions concrètes et préparent un discours politique cohérent. Programme incluant débats structurés et présentation devant jury."
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "EducationalOccupationalProgram",
              "name": "MGS - Moroccan Governance Simulation",
              "description": "Simulation éducative pour comprendre le système de gouvernance territoriale du Maroc, incluant les rôles des communes, provinces et régions. Les participants analysent des problématiques concrètes de développement local, proposent des initiatives politiques et simulent la coordination entre différents niveaux territoriaux."
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "EducationalOccupationalProgram",
              "name": "MBS - Moroccan Budget Simulation",
              "description": "Simulation aidant les jeunes à comprendre comment les budgets publics sont préparés et alloués au Maroc. Les participants analysent les besoins sectoriels, identifient les priorités de développement et proposent une allocation budgétaire régionale alignée avec les réalités sociales, économiques et territoriales."
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "EducationalOccupationalProgram",
              "name": "MPS - Youth Parliament Simulation",
              "description": "Simulation parlementaire immersive introduisant les participants au processus législatif marocain. Les participants endossent des rôles parlementaires, analysent des questions de politique publique, rédigent des propositions législatives et défendent leurs positions à travers des débats structurés."
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Event",
              "name": "Youth Fair",
              "description": "Événement gratuit d'orientation, opportunités et développement des compétences pour les jeunes. Rassemble organisations, associations, clubs étudiants, startups et institutions à travers des stands interactifs, ateliers et activités. Thèmes : leadership, prise de parole en public, entrepreneuriat, orientation académique et programmes internationaux. Partenaires incluant universités, agences d'orientation et entreprises."
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Event",
              "name": "VOICES of Hope",
              "description": "Initiative de bénévolat et d'action sociale soutenant les communautés vulnérables. Inclut visites de terrain dans les zones rurales défavorisées, activités caritatives (distribution d'iftar Ramadan, organisation vêtements/nourriture), assistance dans les orphelinats (Dar Aytam) et maisons de retraite, campagne de sensibilisation sociale à travers photos et témoignages."
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Event",
              "name": "Let Women SPEAK",
              "description": "Événement dédié à la valorisation de la voix des femmes dans le monde des affaires, entrepreneuriat et leadership. Format TED Talks, panels interactifs, success stories et ateliers pratiques. Réunit entrepreneures, professionnelles, étudiantes et expertes pour encourager la prise de parole, l'initiative et la collaboration féminine dans le business."
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Event",
              "name": "United Skills Forum",
              "description": "Sommet multidisciplinaire de la jeunesse combinant conférence de leadership et développement de compétences du 21e siècle. Sessions keynote inspirantes, ateliers pratiques et mini-compétition créative. Développe leadership, communication et résolution de problèmes pour renforcer la prochaine génération de changemakers du Maroc."
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "EducationalOccupationalProgram",
              "name": "Atlas Leaders Program",
              "description": "Programme d'été de quatre semaines (27 juillet - 28 août) développant la prochaine génération de leaders marocains résolveurs de problèmes. Sessions interactives et mentorat guidant les participants à identifier un problème réel, l'analyser en profondeur, concevoir des solutions réalistes et les implémenter dans leurs communautés. Développe communication, leadership, recherche, pensée critique et apprentissage collaboratif."
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Event",
              "name": "Rahmat Al Walidayn",
              "description": "Initiative humanitaire de Ramadan structurée sur quatre semaines à partir du 18 février. Organisation d'iftars en collaboration avec pâtisserie locale et association Linartaqui, préparation de Ma'idat Rahman, et iftar à grande échelle en partenariat avec le groupe bénévole Motatawi3 pour maximiser l'impact, la solidarité et la sensibilisation pendant le mois sacré."
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Event",
              "name": "Campagne Nationale de Nettoyage",
              "description": "Campagne nationale environnementale en février mobilisant les membres UMY autour d'actions de nettoyage des plages et lieux publics dans plusieurs villes (Rabat, Témara, Casablanca, Marrakech, Agadir, Mohammedia). Action simultanée et coordonnée pour renforcer la sensibilisation environnementale et promouvoir l'engagement citoyen."
            }
          }
        ]
      }
    }
